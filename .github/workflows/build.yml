name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Paketlar
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip autoconf libtool \
            pkg-config libncurses5-dev libncursesw5-dev cmake \
            libffi-dev libssl-dev python3-pip python3-dev \
            build-essential zlib1g-dev lld ccache
      - name: Buildozer
        run: |
          pip install buildozer==1.5.0 cython==0.29.33
      - uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-v1
      - name: Build APK
        run: buildozer -v android debug
      - uses: actions/upload-artifact@v4
        with:
          name: omborxona-debug-apk
          path: bin/*.apk