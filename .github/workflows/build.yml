name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Tizim paketlari
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip autoconf libtool pkg-config wget \
            libncurses5-dev libncursesw5-dev cmake \
            libffi-dev libssl-dev python3-pip python3-dev \
            build-essential zlib1g-dev lld ccache

      - name: Buildozer va Cython
        run: |
          pip3 install --upgrade pip
          pip3 install Cython==0.29.33 buildozer==1.5.0

      - name: SDK litsenziyalari qabul qilish
        run: |
          yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager \
            --licenses || true
          /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager \
            "build-tools;33.0.2" "platforms;android-33" "platform-tools" || true

      - uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: ${{ runner.os }}-buildozer-v5

      - name: APK build
        env:
          ANDROIDSDK: /usr/local/lib/android/sdk
          ANDROIDNDK: /usr/local/lib/android/sdk/ndk/27.3.13750724
          ANDROIDAPI: "33"
          ANDROIDMINAPI: "21"
        run: buildozer android debug

      - uses: actions/upload-artifact@v4
        with:
          name: omborxona-debug-apk
          path: bin/*.apk
          retention-days: 30